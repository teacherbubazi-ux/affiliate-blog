<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Admin</title>

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://unpkg.com/decap-cms@3.13.0/dist/decap-cms.js"></script>
</head>

<body>

<div id="nc-root"></div>

<script>
  // Fix Identity login flow
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }

  // 🔥 FORCE CMS INITIALIZATION (THIS IS THE KEY FIX)
  if (window.CMS) {
    window.CMS.init();
  } else {
    console.error("CMS failed to load");
  }
</script>

</body>
</html>
